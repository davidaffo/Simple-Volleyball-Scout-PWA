<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer Markdown</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --panel: #111827;
      --panel-2: #0f172a;
      --border: #243244;
      --text: #e5edf8;
      --muted: #9fb3c8;
      --link: #93c5fd;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, rgba(37, 99, 235, 0.16), transparent 28%), var(--bg);
      color: var(--text);
      font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .shell {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 20px;
      padding: 16px 18px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
    }
    .topbar h1 {
      margin: 0;
      font-size: 1.1rem;
    }
    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .topbar__actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #34518a;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
    }
    .btn.secondary {
      background: var(--panel-2);
      border-color: var(--border);
      color: var(--text);
    }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 24px;
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 16px;
      max-height: calc(100vh - 48px);
      overflow: auto;
    }
    .sidebar h2 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .sidebar-nav {
      display: grid;
      gap: 4px;
    }
    .sidebar-link {
      display: block;
      padding: 8px 10px;
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      line-height: 1.35;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.02);
    }
    .sidebar-link:hover {
      background: rgba(37, 99, 235, 0.12);
      border-color: rgba(96, 165, 250, 0.3);
    }
    .sidebar-link.level-3 {
      margin-left: 14px;
      font-size: 0.94rem;
      color: #d7e5f6;
    }
    .sidebar-empty {
      color: var(--muted);
      font-size: 0.92rem;
    }
    .card {
      background: rgba(17, 24, 39, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
    }
    .error {
      border-color: #7f1d1d;
      background: rgba(69, 10, 10, 0.35);
      color: #fecaca;
    }
    .doc h1,
    .doc h2,
    .doc h3,
    .doc h4 {
      line-height: 1.25;
      margin: 1.3em 0 0.55em;
    }
    .doc h1:first-child,
    .doc h2:first-child {
      margin-top: 0;
    }
    .doc h1 { font-size: 2rem; }
    .doc h2 {
      font-size: 1.45rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    .doc h3 { font-size: 1.15rem; }
    .doc p,
    .doc ul,
    .doc ol,
    .doc blockquote {
      margin: 0 0 1rem;
    }
    .doc ul,
    .doc ol {
      padding-left: 1.35rem;
    }
    .doc li + li {
      margin-top: 0.24rem;
    }
    .doc a {
      color: var(--link);
    }
    .doc strong {
      color: white;
    }
    .doc code {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.08rem 0.38rem;
      font-size: 0.92em;
    }
    .doc pre {
      overflow: auto;
      padding: 14px;
      border-radius: 14px;
      background: #09101d;
      border: 1px solid var(--border);
      margin: 0 0 1rem;
    }
    .doc pre code {
      background: transparent;
      border: 0;
      padding: 0;
    }
    .doc blockquote {
      margin-left: 0;
      padding: 0.9rem 1rem;
      border-left: 4px solid #60a5fa;
      background: rgba(37, 99, 235, 0.08);
      border-radius: 0 12px 12px 0;
      color: #dbeafe;
    }
    .doc hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .doc table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 1rem;
      font-size: 0.95rem;
    }
    .doc th,
    .doc td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    .doc th {
      background: #0f172a;
    }
    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: static;
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>
        <h1 id="viewer-title">Manuale</h1>
        <p id="viewer-subtitle">Viewer Markdown locale</p>
      </div>
      <div class="topbar__actions">
        <a class="btn secondary" href="../index.html">Torna all'app</a>
        <a class="btn" id="source-link" href="manual.md">Apri Markdown</a>
      </div>
    </div>
    <div class="layout">
      <aside class="sidebar">
        <h2>Capitoli</h2>
        <nav id="doc-nav" class="sidebar-nav" aria-label="Indice automatico">
          <div class="sidebar-empty">Caricamento…</div>
        </nav>
      </aside>
      <div class="card doc" id="doc-root" aria-live="polite">Caricamento…</div>
    </div>
  </div>
  <script>
    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function applyInlineMarkdown(text) {
      let out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, "<code>$1</code>");
      out = out.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      out = out.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      return out;
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      const headings = [];
      const usedSlugs = new Map();
      let paragraph = [];
      let listType = null;
      let inCode = false;
      let codeLines = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        html.push("<p>" + applyInlineMarkdown(paragraph.join(" ")) + "</p>");
        paragraph = [];
      }

      function flushList() {
        if (!listType) return;
        html.push(`</${listType}>`);
        listType = null;
      }

      function flushCode() {
        if (!inCode) return;
        html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
        inCode = false;
        codeLines = [];
      }

      for (const line of lines) {
        if (line.startsWith("```")) {
          flushParagraph();
          flushList();
          if (inCode) {
            flushCode();
          } else {
            inCode = true;
            codeLines = [];
          }
          continue;
        }
        if (inCode) {
          codeLines.push(line);
          continue;
        }

        const trimmed = line.trim();
        if (!trimmed) {
          flushParagraph();
          flushList();
          continue;
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          flushList();
          const level = heading[1].length;
          const rawText = heading[2].trim();
          const baseSlug = slugify(rawText) || "section";
          const count = usedSlugs.get(baseSlug) || 0;
          usedSlugs.set(baseSlug, count + 1);
          const slug = count ? `${baseSlug}-${count + 1}` : baseSlug;
          headings.push({ level, text: rawText, slug });
          html.push(`<h${level} id="${slug}">${applyInlineMarkdown(rawText)}</h${level}>`);
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          flushParagraph();
          flushList();
          html.push("<hr />");
          continue;
        }

        const quote = trimmed.match(/^>\s?(.*)$/);
        if (quote) {
          flushParagraph();
          flushList();
          html.push("<blockquote>" + applyInlineMarkdown(quote[1]) + "</blockquote>");
          continue;
        }

        const bullet = trimmed.match(/^[-*]\s+(.*)$/);
        if (bullet) {
          flushParagraph();
          if (listType !== "ul") {
            flushList();
            listType = "ul";
            html.push("<ul>");
          }
          html.push("<li>" + applyInlineMarkdown(bullet[1]) + "</li>");
          continue;
        }

        const ordered = trimmed.match(/^\d+\.\s+(.*)$/);
        if (ordered) {
          flushParagraph();
          if (listType !== "ol") {
            flushList();
            listType = "ol";
            html.push("<ol>");
          }
          html.push("<li>" + applyInlineMarkdown(ordered[1]) + "</li>");
          continue;
        }

        flushList();
        paragraph.push(trimmed);
      }

      flushParagraph();
      flushList();
      flushCode();
      return { html: html.join("\n"), headings };
    }

    function renderNav(headings) {
      const nav = document.getElementById("doc-nav");
      if (!headings.length) {
        nav.innerHTML = '<div class="sidebar-empty">Nessun header trovato.</div>';
        return;
      }
      const items = headings
        .filter(item => item.level <= 3)
        .map(item => {
          const levelClass = item.level >= 3 ? " level-3" : "";
          return `<a class="sidebar-link${levelClass}" href="#${item.slug}">${escapeHtml(item.text)}</a>`;
        })
        .join("");
      nav.innerHTML = items || '<div class="sidebar-empty">Nessun header trovato.</div>';
    }

    async function main() {
      const root = document.getElementById("doc-root");
      const params = new URLSearchParams(window.location.search);
      const doc = params.get("doc") || "manual.md";
      const title = params.get("title") || "Manuale";
      document.getElementById("viewer-title").textContent = title;
      document.getElementById("source-link").href = doc;

      try {
        const response = await fetch(doc);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const markdown = await response.text();
        const rendered = renderMarkdown(markdown);
        root.innerHTML = rendered.html;
        renderNav(rendered.headings);
      } catch (error) {
        root.classList.add("error");
        document.getElementById("doc-nav").innerHTML = '<div class="sidebar-empty">Indice non disponibile.</div>';
        root.innerHTML =
          "<strong>Impossibile caricare il Markdown.</strong><br><br>" +
          "Se stai aprendo il progetto in <code>file://</code>, alcuni browser bloccano il caricamento via script.<br>" +
          "Apri direttamente il file Markdown oppure usa l'app via <code>localhost</code> / web server locale.<br><br>" +
          "Dettaglio: <code>" + escapeHtml(String(error && error.message ? error.message : error)) + "</code>";
      }
    }

    main();
  </script>
</body>
</html>
